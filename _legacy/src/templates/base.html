<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{THEME_TITLE_EN}} - English Learning | 英语学习</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== CSS Custom Properties ===== */
:root {
  --shadow-offset: 3px;
  --radius: 12px;
}

/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ===== Typography ===== */
body {
  font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
  background: #f0f4f8;
  color: #2d3748;
  min-height: 100vh;
}
h1, h2, h3 { font-weight: 800; }

/* ===== Page Header ===== */
.page-header {
  background: white;
  padding: 12px 28px;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.theme-title { font-size: 1.5rem; color: #1a202c; }
.theme-zh { font-size: 1rem; color: #718096; margin-left: 10px; font-weight: 600; }
.style-badge {
  font-size: 0.72rem;
  background: #edf2f7;
  color: #4a5568;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 700;
}
.controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.score-display {
  background: #edf2f7;
  color: #2d3748;
  padding: 6px 14px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 0.9rem;
}

/* ===== Story Bar ===== */
.story-bar {
  background: white;
  border-bottom: 1px solid #e2e8f0;
  padding: 0 28px;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.story-bar.collapsed { max-height: 44px; }
.story-bar.expanded { max-height: 300px; }
.story-toggle {
  width: 100%;
  border: none;
  background: none;
  padding: 10px 0;
  cursor: pointer;
  font-family: inherit;
  font-weight: 700;
  font-size: 0.9rem;
  color: #4a5568;
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
}
.story-toggle:hover { color: #1a202c; }
.story-toggle .arrow { transition: transform 0.2s; display: inline-block; }
.story-bar.expanded .story-toggle .arrow { transform: rotate(180deg); }
.story-content {
  display: flex;
  gap: 24px;
  padding-bottom: 12px;
  font-size: 0.92rem;
  line-height: 1.6;
}
.story-en { flex: 1; color: #2d3748; }
.story-zh { flex: 1; color: #718096; }

/* ===== Buttons ===== */
.btn {
  background: white;
  color: #2d3748;
  border: 1.5px solid #e2e8f0;
  padding: 8px 16px;
  font-family: inherit;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.15s;
}
.btn:hover { background: #f7fafc; border-color: #cbd5e0; }
.btn:active { background: #edf2f7; transform: scale(0.98); }
.btn.active-btn { background: #4299e1; color: white; border-color: #4299e1; }
.btn.accent { background: #48bb78; color: white; border-color: #48bb78; }
.btn.accent:hover { background: #38a169; }

/* ===== Scene Navigation ===== */
.scene-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 10px 20px;
  background: white;
  border-bottom: 1px solid #e2e8f0;
}
.nav-arrow {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1.5px solid #e2e8f0;
  background: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  color: #4a5568;
  transition: all 0.15s;
  flex-shrink: 0;
}
.nav-arrow:hover { background: #f7fafc; border-color: #4299e1; color: #4299e1; }
.nav-arrow:active { transform: scale(0.95); }
.nav-arrow:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
.scene-info { text-align: center; min-width: 140px; }
.scene-num { font-size: 0.78rem; font-weight: 700; color: #a0aec0; text-transform: uppercase; letter-spacing: 1px; }
.scene-name { font-size: 1rem; font-weight: 800; color: #1a202c; margin-top: 2px; }
.scene-dots { display: flex; gap: 6px; margin-top: 4px; justify-content: center; }
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #cbd5e0;
  transition: all 0.2s;
  cursor: pointer;
}
.dot.active { background: #4299e1; transform: scale(1.3); }
.dot:hover:not(.active) { background: #a0aec0; }

/* ===== Main Layout ===== */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 370px;
  gap: 0;
  min-height: calc(100vh - 215px);
}

/* ===== Scene Panel ===== */
.scene-panel {
  background: white;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: default;
  min-height: 500px;
  border-right: 1px solid #e2e8f0;
  transition: opacity 0.2s ease;
}
.scene-panel.switching { opacity: 0.5; }
.scene-panel svg {
  display: block;
  width: 100%;
  height: auto;
  max-height: 100%;
}

/* ===== Clickable Elements ===== */
.clickable {
  cursor: pointer;
  transition: filter 0.2s ease, transform 0.2s ease;
}
.clickable:hover {
  filter: drop-shadow(0 0 10px rgba(66,153,225,0.6)) brightness(1.1);
  transform: scale(1.03);
  transform-origin: center;
}
.clickable:active { filter: brightness(0.9); transform: scale(0.97); }
.clickable.highlight {
  filter: drop-shadow(0 0 14px rgba(66,153,225,0.8));
  animation: pulse 0.8s ease-in-out infinite;
}

/* ===== Sidebar ===== */
.sidebar {
  background: white;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 215px);
}
.sidebar-tabs {
  display: flex;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 12px 8px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  font-weight: 700;
  font-size: 0.82rem;
  color: #a0aec0;
  transition: color 0.15s, box-shadow 0.15s;
  border-bottom: 2px solid transparent;
}
.tab.active { color: #4299e1; border-bottom-color: #4299e1; }
.tab:hover:not(.active) { color: #4a5568; }

.tab-content {
  overflow-y: auto;
  flex: 1;
  padding: 8px;
}
.tab-content.hidden { display: none; }

/* ===== Vocabulary Items ===== */
.vocab-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 2px;
}
.vocab-item:hover { background: #f7fafc; }
.vocab-item .word-en { font-weight: 700; font-size: 1rem; min-width: 85px; }
.vocab-item .word-zh { color: #718096; font-size: 0.85rem; flex: 1; }
.difficulty-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  white-space: nowrap;
}
.difficulty-badge.easy { background: #c6f6d5; color: #276749; }
.difficulty-badge.medium { background: #fefcbf; color: #975a16; }
.difficulty-badge.hard { background: #fed7d7; color: #9b2c2c; }

/* ===== Verb & Expression Items ===== */
.verb-item, .expression-item {
  padding: 12px 12px;
  border-radius: 8px;
  margin-bottom: 4px;
}
.verb-item:hover, .expression-item:hover { background: #f7fafc; }
.verb-item .verb-en, .expression-item .exp-en {
  font-weight: 700;
  font-size: 1rem;
}
.verb-item .verb-zh, .expression-item .exp-zh {
  color: #718096;
  font-size: 0.85rem;
  margin-top: 2px;
}
.verb-item .verb-forms {
  font-size: 0.78rem;
  color: #a0aec0;
  margin-top: 3px;
  font-style: italic;
}
.verb-examples, .exp-context {
  margin-top: 6px;
  padding-left: 10px;
  border-left: 3px solid #4299e1;
}
.verb-examples .ex-line, .exp-context .ex-line {
  font-size: 0.82rem;
  color: #4a5568;
  margin: 3px 0;
  line-height: 1.5;
}
.verb-examples .ex-line .ex-zh, .exp-context .ex-line .ex-zh {
  color: #a0aec0;
  display: block;
  font-size: 0.78rem;
}

/* ===== Word Popup / Modal ===== */
.popup-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 999;
  animation: fade-in 0.2s ease;
  backdrop-filter: blur(2px);
}
.popup-overlay.hidden { display: none; }
.word-popup {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1000;
  background: white;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  padding: 32px;
  max-width: 480px;
  width: 92%;
  animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.word-popup.hidden { display: none; }
.popup-close {
  position: absolute;
  top: 12px; right: 14px;
  background: #edf2f7;
  color: #4a5568;
  border: none;
  width: 30px; height: 30px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.popup-close:hover { background: #e53e3e; color: white; }
.popup-word {
  font-size: 2rem;
  font-weight: 800;
  color: #1a202c;
}
.popup-chinese { font-size: 1.2rem; color: #718096; margin: 4px 0; }
.popup-pos {
  display: inline-block;
  background: #edf2f7;
  color: #4a5568;
  padding: 3px 12px;
  font-size: 0.75rem;
  font-weight: 700;
  border-radius: 20px;
  margin: 6px 0 14px;
}
.popup-examples { margin: 12px 0; }
.popup-examples .popup-ex {
  background: #f7fafc;
  padding: 10px 14px;
  border-radius: 10px;
  margin-bottom: 6px;
  font-size: 0.92rem;
  line-height: 1.5;
}
.popup-ex .ex-en { font-weight: 600; color: #2d3748; }
.popup-ex .ex-zh { color: #a0aec0; margin-top: 2px; font-size: 0.85rem; }
.popup-scene-tag {
  font-size: 0.72rem;
  color: #a0aec0;
  margin-bottom: 8px;
}
.popup-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.related-verbs {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid #e2e8f0;
  font-size: 0.85rem;
}
.related-verbs strong { color: #4299e1; }

/* ===== Page Footer ===== */
.page-footer {
  padding: 10px 28px;
  border-top: 1px solid #e2e8f0;
  background: white;
  text-align: center;
  font-weight: 600;
  font-size: 0.82rem;
  color: #a0aec0;
}

/* ===== Quiz Mode ===== */
body.quiz-mode .chinese-text { display: none !important; }
body.quiz-mode .theme-zh { display: none !important; }
body.quiz-mode .popup-chinese { display: block !important; }

/* ===== Animations ===== */
@keyframes pop-in {
  from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
  to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes pulse {
  0%, 100% { filter: drop-shadow(0 0 10px rgba(66,153,225,0.6)); }
  50% { filter: drop-shadow(0 0 20px rgba(66,153,225,0.9)) brightness(1.15); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.shake { animation: shake 0.5s ease; }

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .main-layout {
    grid-template-columns: 1fr;
  }
  .scene-panel {
    min-height: 320px;
    border-right: none;
    border-bottom: 1px solid #e2e8f0;
  }
  .sidebar { max-height: 350px; }
  .page-header { padding: 10px 14px; }
  .theme-title { font-size: 1.2rem; }
  .word-popup { padding: 22px; max-width: 380px; }
  .popup-word { font-size: 1.5rem; }
}

@media (max-width: 500px) {
  .theme-title { font-size: 1rem; }
  .controls { gap: 4px; }
  .btn { padding: 6px 10px; font-size: 0.75rem; }
  .scene-panel { min-height: 240px; }
  .nav-arrow { width: 32px; height: 32px; font-size: 1rem; }
  .word-popup { padding: 16px; border-radius: 12px; }
  .scene-nav { gap: 8px; padding: 8px 12px; }
}
</style>
</head>
<body>

<header class="page-header">
  <div>
    <h1 class="theme-title">
      {{THEME_TITLE_EN}}
      <span class="theme-zh chinese-text">{{THEME_TITLE_ZH}}</span>
    </h1>
  </div>
  <div class="controls">
    <span class="style-badge">{{STYLE_NAME}}</span>
    <span class="score-display" id="scoreDisplay">Score: 0/0</span>
    <button id="modeToggle" class="btn" title="Toggle Quiz Mode">Quiz Mode</button>
    <button id="resetBtn" class="btn" title="Reset Score">Reset</button>
    <button id="hintBtn" class="btn" title="Highlight clickable elements">Hint</button>
  </div>
</header>

<div class="story-bar collapsed" id="storyBar">
  <button class="story-toggle" id="storyToggle">
    <span class="arrow">&#9654;</span> Story 故事
  </button>
  <div class="story-content">
    <p class="story-en">{{STORY_EN}}</p>
    <p class="story-zh chinese-text">{{STORY_ZH}}</p>
  </div>
</div>

<nav class="scene-nav">
  <button class="nav-arrow" id="prevScene" title="Previous Scene">&#9664;</button>
  <div class="scene-info">
    <div class="scene-num" id="sceneNumLabel">Scene 1 / 5</div>
    <div class="scene-name" id="sceneNameLabel">Scene Name</div>
    <div class="scene-dots" id="sceneDots"></div>
  </div>
  <button class="nav-arrow" id="nextScene" title="Next Scene">&#9654;</button>
</nav>

<main class="main-layout">
  <section class="scene-panel" id="scenePanel">
    {{SCENE_0_SVG}}
  </section>

  <aside class="sidebar">
    <nav class="sidebar-tabs">
      <button class="tab active" data-tab="vocab">Vocab 词汇</button>
      <button class="tab" data-tab="verbs">Verbs 动词</button>
      <button class="tab" data-tab="expressions">Express 表达</button>
    </nav>
    <div class="tab-content" id="vocabTab"></div>
    <div class="tab-content hidden" id="verbsTab"></div>
    <div class="tab-content hidden" id="expressionsTab"></div>
  </aside>
</main>

<div class="popup-overlay hidden" id="popupOverlay"></div>
<div class="word-popup hidden" id="wordPopup">
  <button class="popup-close" id="popupClose">&times;</button>
  <div class="popup-scene-tag" id="popupSceneTag"></div>
  <h2 class="popup-word" id="popupWord"></h2>
  <p class="popup-chinese chinese-text" id="popupChinese"></p>
  <span class="popup-pos" id="popupPos"></span>
  <div class="popup-examples" id="popupExamples"></div>
  <div class="related-verbs hidden" id="relatedVerbs">
    <strong>Related Verbs:</strong>
    <p id="relatedVerbsContent"></p>
  </div>
  <div class="popup-actions">
    <button class="btn accent" id="pronounceBtn">Listen</button>
    <button class="btn" id="nextWordBtn">Next</button>
  </div>
</div>

<footer class="page-footer">
  Click elements to learn | Arrow keys to navigate scenes &amp; words | Esc to close popup
  &nbsp;|&nbsp; 点击场景元素学习英语 | 方向键切换场景和词汇
</footer>

<script>
// ===== All Scenes Data =====
const THEME_TITLE = {{THEME_TITLE_JSON}};
const THEME_STORY = {{THEME_STORY_JSON}};
const SCENES = {{SCENES_DATA}};
const TOTAL_SCENES = SCENES.length;

// ===== State =====
let currentSceneIndex = 0;
let isQuizMode = false;
let score = { correct: 0, total: 0 };
let answeredWords = {};  // key: "sceneIdx:wordId"
let currentWordIndex = -1;
let allClickableEls = [];

// ===== Load State from localStorage =====
function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem('themeEnglish_state') || '{}');
    if (saved.answeredWords) answeredWords = saved.answeredWords;
    if (saved.score) score = saved.score;
    if (saved.currentSceneIndex !== undefined) {
      currentSceneIndex = saved.currentSceneIndex;
    }
    if (saved.isQuizMode !== undefined) {
      isQuizMode = saved.isQuizMode;
      updateQuizModeUI();
    }
  } catch(e) { /* ignore */ }
  updateScoreDisplay();
}

function saveState() {
  try {
    localStorage.setItem('themeEnglish_state', JSON.stringify({
      answeredWords, score, currentSceneIndex, isQuizMode
    }));
  } catch(e) { /* ignore */ }
}

function getCurrentScene() {
  return SCENES[currentSceneIndex];
}

// ===== DOM References =====
const scenePanel = document.getElementById('scenePanel');
const wordPopup = document.getElementById('wordPopup');
const popupOverlay = document.getElementById('popupOverlay');
const popupWord = document.getElementById('popupWord');
const popupChinese = document.getElementById('popupChinese');
const popupPos = document.getElementById('popupPos');
const popupExamples = document.getElementById('popupExamples');
const popupSceneTag = document.getElementById('popupSceneTag');
const relatedVerbs = document.getElementById('relatedVerbs');
const relatedVerbsContent = document.getElementById('relatedVerbsContent');
const scoreDisplay = document.getElementById('scoreDisplay');
const modeToggle = document.getElementById('modeToggle');
const sceneNumLabel = document.getElementById('sceneNumLabel');
const sceneNameLabel = document.getElementById('sceneNameLabel');
const sceneDots = document.getElementById('sceneDots');

// ===== Scene Navigation =====
function switchScene(index) {
  if (index < 0 || index >= TOTAL_SCENES) return;
  closePopup();

  scenePanel.classList.add('switching');
  currentSceneIndex = index;

  // Update SVG
  scenePanel.innerHTML = getCurrentScene().sceneSvg;

  // Re-attach click handlers to SVG elements
  setTimeout(() => {
    scenePanel.classList.remove('switching');
    initClickableElements();
    updateSceneUI();
    renderSidebar();
    saveState();
  }, 150);
}

function updateSceneUI() {
  const scene = getCurrentScene();
  sceneNumLabel.textContent = `Scene ${currentSceneIndex + 1} / ${TOTAL_SCENES}`;
  sceneNameLabel.textContent = scene.sceneTitle.en;

  // Update dots
  sceneDots.innerHTML = '';
  for (let i = 0; i < TOTAL_SCENES; i++) {
    const dot = document.createElement('span');
    dot.className = 'dot' + (i === currentSceneIndex ? ' active' : '');
    dot.addEventListener('click', () => switchScene(i));
    dot.title = SCENES[i].sceneTitle.en;
    sceneDots.appendChild(dot);
  }

  // Update button states
  document.getElementById('prevScene').disabled = currentSceneIndex === 0;
  document.getElementById('nextScene').disabled = currentSceneIndex === TOTAL_SCENES - 1;

  // Update page title colors
  const cp = scene.colorPalette;
  if (cp) {
    document.documentElement.style.setProperty('--color-primary', cp.primary);
    document.documentElement.style.setProperty('--color-secondary', cp.secondary);
    document.documentElement.style.setProperty('--color-accent', cp.accent);
    document.documentElement.style.setProperty('--color-bg', cp.background);
  }
}

document.getElementById('prevScene').addEventListener('click', () => {
  if (currentSceneIndex > 0) switchScene(currentSceneIndex - 1);
});

document.getElementById('nextScene').addEventListener('click', () => {
  if (currentSceneIndex < TOTAL_SCENES - 1) switchScene(currentSceneIndex + 1);
});

// ===== Click Handling =====
function initClickableElements() {
  allClickableEls = Array.from(scenePanel.querySelectorAll('.clickable'));
  scenePanel.querySelectorAll('svg .clickable').forEach(el => {
    el.style.pointerEvents = 'all';
  });
  currentWordIndex = -1;

  scenePanel.onclick = function(e) {
    const clickable = e.target.closest('.clickable');
    if (!clickable) return;

    const wordId = clickable.getAttribute('data-word-id');
    if (!wordId) return;

    const scene = getCurrentScene();
    const wordData = scene.vocabulary.find(v => v.word === wordId);
    if (!wordData) return;

    const answerKey = `${currentSceneIndex}:${wordId}`;

    if (isQuizMode && !answeredWords[answerKey]) {
      answeredWords[answerKey] = true;
      score.total++;
      score.correct++;
      updateScoreDisplay();
      saveState();
    } else if (!isQuizMode) {
      if (!answeredWords[answerKey]) {
        answeredWords[answerKey] = true;
        score.total++;
        score.correct++;
        updateScoreDisplay();
        saveState();
      }
    }

    showPopup(wordData);
    updateHighlight(wordId);
  };
}

// ===== Popup Functions =====
function showPopup(wordData) {
  const scene = getCurrentScene();
  popupSceneTag.textContent = `${scene.sceneTitle.en} — Scene ${currentSceneIndex + 1}/${TOTAL_SCENES}`;
  popupWord.textContent = wordData.word;
  popupChinese.textContent = wordData.chinese;
  popupPos.textContent = wordData.pos.toUpperCase();

  // Render examples
  const examples = wordData.examples || [];
  popupExamples.innerHTML = examples.map(ex => `
    <div class="popup-ex">
      <div class="ex-en">${escapeHTML(ex.en)}</div>
      <div class="ex-zh chinese-text">${escapeHTML(ex.zh)}</div>
    </div>
  `).join('');

  // Find related verbs
  const verbs = scene.actionVerbs || [];
  const related = verbs.filter(v => {
    const allText = (v.examples || []).map(e => e.en + e.zh).join(' ').toLowerCase();
    return allText.includes(wordData.word.toLowerCase()) ||
           allText.includes(wordData.chinese);
  });
  if (related.length > 0) {
    relatedVerbs.classList.remove('hidden');
    relatedVerbsContent.textContent = related.map(v => `${v.verb} (${v.chinese})`).join(', ');
  } else {
    relatedVerbs.classList.add('hidden');
  }

  wordPopup.classList.remove('hidden');
  popupOverlay.classList.remove('hidden');

  if (isQuizMode) {
    popupChinese.style.visibility = 'hidden';
    popupExamples.querySelectorAll('.ex-zh').forEach(el => el.style.visibility = 'hidden');
  } else {
    popupChinese.style.visibility = 'visible';
    popupExamples.querySelectorAll('.ex-zh').forEach(el => el.style.visibility = 'visible');
  }
}

function closePopup() {
  wordPopup.classList.add('hidden');
  popupOverlay.classList.add('hidden');
  popupChinese.style.visibility = 'visible';
  popupExamples.querySelectorAll('.ex-zh').forEach(el => el.style.visibility = 'visible');
  clearHighlight();
}

wordPopup.addEventListener('click', function(e) {
  if (isQuizMode && popupChinese.style.visibility === 'hidden') {
    popupChinese.style.visibility = 'visible';
    popupExamples.querySelectorAll('.ex-zh').forEach(el => el.style.visibility = 'visible');
  }
});

document.getElementById('popupClose').addEventListener('click', closePopup);
popupOverlay.addEventListener('click', closePopup);

// ===== Highlight Management =====
function updateHighlight(wordId) {
  clearHighlight();
  const el = scenePanel.querySelector(`[data-word-id="${CSS.escape(wordId)}"]`);
  if (el) {
    el.classList.add('highlight');
    currentWordIndex = allClickableEls.indexOf(el);
  }
}

function clearHighlight() {
  scenePanel.querySelectorAll('.clickable.highlight').forEach(el => el.classList.remove('highlight'));
}

// ===== Speech =====
document.getElementById('pronounceBtn').addEventListener('click', function() {
  const word = popupWord.textContent;
  if (!word || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = 'en-US';
  utterance.rate = 0.85;
  window.speechSynthesis.speak(utterance);
});

// ===== Quiz Mode =====
modeToggle.addEventListener('click', function() {
  isQuizMode = !isQuizMode;
  updateQuizModeUI();
  saveState();
});

function updateQuizModeUI() {
  if (isQuizMode) {
    document.body.classList.add('quiz-mode');
    modeToggle.textContent = 'Learning Mode';
    modeToggle.classList.add('active-btn');
  } else {
    document.body.classList.remove('quiz-mode');
    modeToggle.textContent = 'Quiz Mode';
    modeToggle.classList.remove('active-btn');
  }
}

// ===== Reset =====
document.getElementById('resetBtn').addEventListener('click', function() {
  score = { correct: 0, total: 0 };
  answeredWords = {};
  updateScoreDisplay();
  saveState();
  closePopup();
});

function updateScoreDisplay() {
  scoreDisplay.textContent = `Score: ${score.correct}/${score.total}`;
}

// ===== Hint =====
let hintActive = false;
document.getElementById('hintBtn').addEventListener('click', function() {
  hintActive = !hintActive;
  if (hintActive) {
    this.classList.add('active-btn');
    allClickableEls.forEach(el => el.classList.add('highlight'));
  } else {
    this.classList.remove('active-btn');
    allClickableEls.forEach(el => el.classList.remove('highlight'));
  }
});

// ===== Keyboard Navigation =====
document.addEventListener('keydown', function(e) {
  // Scene switching with Ctrl/Cmd + arrows
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'ArrowRight') {
      e.preventDefault();
      if (currentSceneIndex < TOTAL_SCENES - 1) switchScene(currentSceneIndex + 1);
      return;
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      if (currentSceneIndex > 0) switchScene(currentSceneIndex - 1);
      return;
    }
  }

  if (wordPopup.classList.contains('hidden')) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      navigateToElement(1);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      navigateToElement(-1);
    }
  } else {
    if (e.key === 'Escape') {
      e.preventDefault();
      closePopup();
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      navigateToElement(1);
      closePopup();
      showCurrentElementPopup();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      navigateToElement(-1);
      closePopup();
      showCurrentElementPopup();
    }
  }
});

function navigateToElement(direction) {
  if (allClickableEls.length === 0) return;
  clearHighlight();
  currentWordIndex = (currentWordIndex + direction + allClickableEls.length) % allClickableEls.length;
  allClickableEls[currentWordIndex].classList.add('highlight');
  allClickableEls[currentWordIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showCurrentElementPopup() {
  if (currentWordIndex >= 0 && currentWordIndex < allClickableEls.length) {
    const el = allClickableEls[currentWordIndex];
    const wordId = el.getAttribute('data-word-id');
    const scene = getCurrentScene();
    const wordData = scene.vocabulary.find(v => v.word === wordId);
    if (wordData) showPopup(wordData);
  }
}

// ===== Next Word Button =====
document.getElementById('nextWordBtn').addEventListener('click', function() {
  closePopup();
  navigateToElement(1);
  showCurrentElementPopup();
});

// ===== Sidebar Tabs =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    const tabId = this.getAttribute('data-tab');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    document.getElementById(tabId + 'Tab').classList.remove('hidden');
  });
});

// ===== Render Sidebar =====
function renderSidebar() {
  const scene = getCurrentScene();
  renderVocabTab(scene);
  renderVerbsTab(scene);
  renderExpressionsTab(scene);
}

function renderVocabTab(scene) {
  const container = document.getElementById('vocabTab');
  container.innerHTML = scene.vocabulary.map(v => `
    <div class="vocab-item" data-word="${escapeHTML(v.word)}" title="Click to find in scene">
      <span class="word-en">${escapeHTML(v.word)}</span>
      <span class="word-zh chinese-text">${escapeHTML(v.chinese)}</span>
      <span class="difficulty-badge ${v.difficulty}">${v.difficulty}</span>
    </div>
  `).join('');

  container.querySelectorAll('.vocab-item').forEach(item => {
    item.addEventListener('click', function() {
      const word = this.getAttribute('data-word');
      const el = scenePanel.querySelector(`[data-word-id="${CSS.escape(word)}"]`);
      if (el) {
        clearHighlight();
        el.classList.add('highlight');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        const wordData = scene.vocabulary.find(v => v.word === word);
        if (wordData) showPopup(wordData);
      }
    });
  });
}

function renderVerbsTab(scene) {
  const container = document.getElementById('verbsTab');
  container.innerHTML = (scene.actionVerbs || []).map(v => {
    const examplesHTML = (v.examples || []).map(ex => `
      <div class="ex-line">
        ${escapeHTML(ex.en)}
        <span class="ex-zh chinese-text">${escapeHTML(ex.zh)}</span>
      </div>
    `).join('');
    return `
      <div class="verb-item">
        <div class="verb-en">${escapeHTML(v.verb)} <span class="chinese-text">(${escapeHTML(v.chinese)})</span></div>
        <div class="verb-forms">${escapeHTML(v.presentParticiple || '')} | ${escapeHTML(v.pastTense || '')}</div>
        <div class="verb-examples">${examplesHTML}</div>
      </div>
    `;
  }).join('');
}

function renderExpressionsTab(scene) {
  const container = document.getElementById('expressionsTab');
  container.innerHTML = (scene.expressions || []).map(e => `
    <div class="expression-item">
      <div class="exp-en">${escapeHTML(e.english)}</div>
      <div class="exp-zh chinese-text">${escapeHTML(e.chinese)}</div>
      <div class="exp-context">
        <div class="ex-line">${escapeHTML(e.context || '')}</div>
      </div>
    </div>
  `).join('');
}

// ===== Story Toggle =====
const storyBar = document.getElementById('storyBar');
document.getElementById('storyToggle').addEventListener('click', () => {
  storyBar.classList.toggle('collapsed');
  storyBar.classList.toggle('expanded');
});

// ===== Helpers =====
function escapeHTML(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ===== Initialize =====
function init() {
  updateSceneUI();
  initClickableElements();
  renderSidebar();
  loadState();

  // Apply saved scene index
  if (currentSceneIndex !== 0) {
    switchScene(currentSceneIndex);
  }

  console.log(`Theme English Learning Page Ready!`);
  console.log(`  Theme: ${THEME_TITLE.en}`);
  console.log(`  ${TOTAL_SCENES} scenes`);
  SCENES.forEach((s, i) => {
    console.log(`  Scene ${i+1}: ${s.sceneTitle.en} — ${s.vocabulary.length} words, ${s.actionVerbs.length} verbs, ${s.expressions.length} expressions`);
  });
  console.log('  Use Ctrl+Arrow to switch scenes, Arrow keys to explore words!');
}

init();
</script>
</body>
